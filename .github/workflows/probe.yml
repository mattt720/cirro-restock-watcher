name: probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run endpoint probe
        run: python scripts/probe.py --out probe-output

      - name: Upload raw payloads
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-payloads
          path: probe-output/
          if-no-files-found: warn
